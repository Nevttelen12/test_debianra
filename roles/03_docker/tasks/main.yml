---
# ╔═══════════════════════════════════════════════════════════════════╗
# ║  Role 03: Docker — Engine + Compose Plugin                      ║
# ╚═══════════════════════════════════════════════════════════════════╝

# ─────────────────────────────────────────────────
# Docker repó beállítás (modern GPG kezelés)
# ─────────────────────────────────────────────────
- name: Docker GPG kulcs letöltése és konvertálása
  ansible.builtin.shell: |
    install -m 0755 -d /etc/apt/keyrings
    curl -fsSL https://download.docker.com/linux/debian/gpg -o /etc/apt/keyrings/docker.asc
    chmod a+r /etc/apt/keyrings/docker.asc
  args:
    creates: /etc/apt/keyrings/docker.asc
  tags: [docker, repo]

- name: Docker APT repó hozzáadása (signed-by formátum)
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/debian
      {{ ansible_distribution_release }} stable
    filename: docker
    state: present
  tags: [docker, repo]

# ─────────────────────────────────────────────────
# Docker telepítés
# ─────────────────────────────────────────────────
- name: Docker engine és Compose plugin telepítése
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: true
  notify: restart docker
  tags: [docker, install]

# ─────────────────────────────────────────────────
# Felhasználói jogok
# ─────────────────────────────────────────────────
- name: "Fejlesztő hozzáadása a docker csoporthoz (→ sudo nélkül fut!)"
  ansible.builtin.user:
    name: "{{ dev_user }}"
    groups: docker
    append: true
  tags: [docker, permissions]

# ─────────────────────────────────────────────────
# Docker service indítása
# ─────────────────────────────────────────────────
- name: Docker service engedélyezése és indítása
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true
  tags: [docker, service]

# ─────────────────────────────────────────────────
# Docker hálózat a Traefikhez
# ─────────────────────────────────────────────────
- name: "traefik-public Docker hálózat létrehozása"
  become: false
  community.docker.docker_network:
    name: traefik-public
    state: present
  tags: [docker, network]

# ─────────────────────────────────────────────────
# lazydocker (Docker TUI)
# ─────────────────────────────────────────────────
- name: lazydocker telepítése
  ansible.builtin.shell: |
    LAZYDOCKER_VERSION=$(curl -s "https://api.github.com/repos/jesseduffield/lazydocker/releases/latest" | jq -r .tag_name | sed 's/^v//')
    curl -Lo /tmp/lazydocker.tar.gz "https://github.com/jesseduffield/lazydocker/releases/download/v${LAZYDOCKER_VERSION}/lazydocker_${LAZYDOCKER_VERSION}_Linux_x86_64.tar.gz"
    tar xf /tmp/lazydocker.tar.gz -C /usr/local/bin lazydocker
    chmod +x /usr/local/bin/lazydocker
    rm -f /tmp/lazydocker.tar.gz
  args:
    creates: /usr/local/bin/lazydocker
  tags: [docker, lazydocker]

# ─────────────────────────────────────────────────
# lazygit (Git TUI)
# ─────────────────────────────────────────────────
- name: lazygit telepítése
  ansible.builtin.shell: |
    LAZYGIT_VERSION=$(curl -s "https://api.github.com/repos/jesseduffield/lazygit/releases/latest" | jq -r .tag_name | sed 's/^v//')
    curl -Lo /tmp/lazygit.tar.gz "https://github.com/jesseduffield/lazygit/releases/download/v${LAZYGIT_VERSION}/lazygit_${LAZYGIT_VERSION}_Linux_x86_64.tar.gz"
    tar xf /tmp/lazygit.tar.gz -C /usr/local/bin lazygit
    chmod +x /usr/local/bin/lazygit
    rm -f /tmp/lazygit.tar.gz
  args:
    creates: /usr/local/bin/lazygit
  tags: [docker, lazygit]
